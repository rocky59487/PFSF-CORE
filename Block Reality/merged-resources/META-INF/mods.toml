modLoader   = "javafml"
# [47,) — javafml reports only the major version (47) in userdev, so [47.2,)
# would fail the loader check and prevent the mod from registering.
# The Forge dependency versionRange "[47.2.0,)" below still guards against
# pre-47.2 Forge versions that lack required APIs (CreativeModeTab.builder, etc.).
loaderVersion = "[47,)"
license     = "MIT"

# ─── Block Reality API ───
[[mods]]
modId           = "blockreality"
version         = "0.2a"
displayName     = "Block Reality API"
description     = '''Minecraft 結構物理模擬底層 API — 提供 UnionFind 結構引擎、應力分析、SidecarBridge IPC、藍圖系統與 SPI 擴充介面。'''

# ─── Fast Design ───
[[mods]]
modId           = "fastdesign"
version         = "0.2a"
displayName     = "Fast Design"
description     = '''三視角 CAD 建築設計模組 — 基於 Block Reality API 的快捷建造、藍圖管理、NURBS 匯出與全息投影系統。'''

# ─── blockreality 的依賴 ───
[[dependencies.blockreality]]
    modId      = "forge"
    mandatory  = true
    versionRange = "[47.2.0,)"
    ordering   = "NONE"
    side       = "BOTH"

[[dependencies.blockreality]]
    modId      = "minecraft"
    mandatory  = true
    versionRange = "[1.20.1,1.21)"
    ordering   = "NONE"
    side       = "BOTH"

# ─── fastdesign 的依賴 ───
[[dependencies.fastdesign]]
    modId      = "forge"
    mandatory  = true
    versionRange = "[47.2.0,)"
    ordering   = "NONE"
    side       = "BOTH"

[[dependencies.fastdesign]]
    modId      = "minecraft"
    mandatory  = true
    versionRange = "[1.20.1,1.21)"
    ordering   = "NONE"
    side       = "BOTH"

[[dependencies.fastdesign]]
    modId      = "blockreality"
    mandatory  = true
    versionRange = "[0.2a,)"
    ordering   = "AFTER"
    side       = "BOTH"
